[mcp_servers.desktop-vision]
command = "/usr/local/bin/node"
args = ["/home/kasm-user/.codex/mcp/desktop-vision.mjs"]
startup_timeout_sec = 30

[mcp_servers.desktop-vision.env]
WORKER_COMPUTER_USE_ENABLED = "1"
DISPLAY = ":1"
WORKER_CHROMIUM_DEBUG_PORT = "9222"

