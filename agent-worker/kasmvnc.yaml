network:
  protocol: http
  ssl:
    pem_certificate: ${HOME}/.vnc/self.pem
    pem_key: ${HOME}/.vnc/self.pem
    require_ssl: false
  udp:
    public_ip: 127.0.0.1
desktop:
  resolution:
    width: 1920
    height: 1080
  allow_resize: true
encoding:
  max_frame_rate: 15
  rect_encoding_mode:
    min_quality: 2
    max_quality: 5

data_loss_prevention:
  clipboard:
    server_to_client:
      enabled: true
      primary_clipboard_enabled: true
    client_to_server:
      enabled: true

runtime_configuration:
  allow_client_to_override_kasm_server_settings: true
  allow_override_standard_vnc_server_settings: true
