name: Docker

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - package.json
      - bun.lock
      - turbo.json
      - tsconfig.base.json
      - configure-github.sh
      - apps/backend/**
      - apps/frontend/**
      - apps/monitor/**
      - agent-worker/**

concurrency:
  group: docker-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      should_build: ${{ steps.matrix.outputs.should_build }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select images from changed files
        id: matrix
        env:
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          before_sha="$BEFORE_SHA"
          if [ -z "$before_sha" ] || [ "$before_sha" = "0000000000000000000000000000000000000000" ]; then
            before_sha="$(git rev-list --max-parents=0 "$CURRENT_SHA" | tail -n 1)"
          fi

          changed_files="$(git diff --name-only "$before_sha" "$CURRENT_SHA")"
          app_changed=false
          worker_changed=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue

            case "$file" in
              Dockerfile|package.json|bun.lock|turbo.json|tsconfig.base.json|apps/backend/*|apps/backend/**|apps/frontend/*|apps/frontend/**)
                app_changed=true
                ;;
            esac

            case "$file" in
              agent-worker/*|agent-worker/**|configure-github.sh|package.json|bun.lock|apps/monitor/*|apps/monitor/**)
                worker_changed=true
                ;;
            esac
          done <<< "$changed_files"

          entries=()
          if [ "$app_changed" = true ]; then
            entries+=('{"image":"agentswarm","context":".","file":"./Dockerfile"}')
          fi
          if [ "$worker_changed" = true ]; then
            entries+=('{"image":"agentswarm-worker","context":".","file":"./agent-worker/Dockerfile"}')
          fi

          if [ "${#entries[@]}" -eq 0 ]; then
            echo 'should_build=false' >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo 'should_build=true' >> "$GITHUB_OUTPUT"
          (
            IFS=,
            echo "matrix={\"include\":[${entries[*]}]}"
          ) >> "$GITHUB_OUTPUT"

  docker:
    needs: changes
    if: needs.changes.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.changes.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Normalize registry owner
        id: repo
        env:
          OWNER: ${{ github.repository_owner }}
        run: echo "owner=${OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.repo.outputs.owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
